name: OpenWrt NSS Build

on:
  repository_dispatch:
    types: [upstream_update]
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      custom_profile:
        description: 'Custom build target profile (e.g. xiaomi_ax9000)'
        required: false
        type: string
      build_ib:
        description: 'Build ImageBuilder'
        required: false
        type: boolean
        default: true
      build_sdk:
        description: 'Build SDK'
        required: false
        type: boolean
        default: false
      make_args:
        description: 'Extra arguments to pass to make (e.g. V=w or "none" for quiet)'
        required: false
        type: string
  schedule:
    - cron: '0 */6 * * *'  # Check for updates every 6 hours
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_upstream:
    runs-on: ubuntu-slim
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_hash: ${{ steps.check.outputs.latest_hash }}
      short_hash: ${{ steps.check.outputs.short_hash }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Check Upstream
        id: check
        run: |
          UPSTREAM_URL="https://github.com/qosmio/openwrt-ipq.git"
          BRANCH="main-nss"
          
          # Get latest commit hash from upstream
          LATEST_HASH=$(git ls-remote $UPSTREAM_URL refs/heads/$BRANCH | awk '{print $1}')
          
          echo "Latest upstream hash: $LATEST_HASH"
          
          # Read stored hash from variable (if exists) or file
          # We use a repository variable for persistence. 
          # Note: This requires the workflow to have read access to variables.
          # If variable is empty, we default to building.
          LAST_BUILT_HASH="${{ vars.LAST_BUILT_HASH }}"
          
          echo "Last built hash: $LAST_BUILT_HASH"
          
          if [ "$LATEST_HASH" != "$LAST_BUILT_HASH" ]; then
            echo "New commit found ($LATEST_HASH). Triggering build."
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "latest_hash=$LATEST_HASH" >> $GITHUB_OUTPUT
            echo "short_hash=${LATEST_HASH:0:8}" >> $GITHUB_OUTPUT
          else
            echo "Upstream matches last build ($LAST_BUILT_HASH). Skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine Matrix
        id: set-matrix
        run: |
          if [ -n "${{ inputs.custom_profile }}" ]; then
            JSON='{
              "device": [
                {
                  "profile": "${{ inputs.custom_profile }}",
                  "primary": true,
                  "name": "${{ inputs.custom_profile }}"
                }
              ]
            }'
          else
            JSON='{
              "device": [
                { "profile": "linksys_mr7350",     "primary": true,  "name": "Linksys MR7350" },
                { "profile": "linksys_mr7500",     "primary": false, "name": "Linksys MR7500" },
                { "profile": "glinet_gl-ax1800",   "primary": false, "name": "GL.iNet GL-AX1800" },
                { "profile": "glinet_gl-axt1800",  "primary": false, "name": "GL.iNet GL-AXT1800" },
                { "profile": "linksys_mx4200v2",   "primary": true,  "name": "Linksys MX4200 v2" },
                { "profile": "linksys_mx4300",     "primary": false, "name": "Linksys MX4300" },
                { "profile": "netgear_wax620",     "primary": false, "name": "Netgear WAX620" },
                { "profile": "dynalink_dl-wrx36",  "primary": false, "name": "Dynalink DL-WRX36" },
                { "profile": "zyxel_nbg7815",      "primary": false, "name": "Zyxel NBG7815" },
                { "profile": "xiaomi_ax3600",      "primary": false, "name": "Xiaomi AX3600" }
              ]
            }'
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  prepare_release:
    needs: check_upstream
    if: ${{ needs.check_upstream.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release_tag.outputs.value }}
    steps:
      - name: Compute release tag
        id: release_tag
        run: |
          SHORT="${{ needs.check_upstream.outputs.short_hash }}"
          if [ -z "$SHORT" ]; then
            SHORT="${GITHUB_SHA:0:8}"
          fi
          echo "value=nss-$SHORT" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v25
      - name: Pre-update flake.lock
        run: nix flake update
      - name: Upload flake.lock
        uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: OpenWrt NSS Build (${{ steps.release_tag.outputs.value }})
          prerelease: true
          draft: true
          body: |
            * **Upstream Commit:** https://github.com/qosmio/openwrt-ipq/commit/${{ needs.check_upstream.outputs.latest_hash || 'N/A' }}
            * **Build Commit:** ${{ github.sha }}
            * **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build:
    needs: [check_upstream, prepare_release]
    if: ${{ needs.check_upstream.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check_upstream.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v6

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Download flake.lock
      uses: actions/download-artifact@v8
      with:
        name: flake-lock

    - name: Enable /dev/fuse
      run: |
        sudo apt-get update && sudo apt-get install -y fuse3 || true
        sudo modprobe fuse || true
        sudo chmod 666 /dev/fuse
        sudo chown root:$(id -gn) /dev/fuse

    - name: Install Nix
      uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Cache OpenWrt dl directory
      uses: actions/cache@v5
      with:
        path: dl
        key: ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ hashFiles('flake.nix', 'packages.txt') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-
          ${{ runner.os }}-openwrt-dl-

    - name: Cache OpenWrt ccache
      uses: actions/cache@v5
      with:
        path: .ccache
        key: ${{ runner.os }}-openwrt-ccache-${{ matrix.device.profile }}-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-openwrt-ccache-${{ matrix.device.profile }}-${{ github.ref_name }}-
          ${{ runner.os }}-openwrt-ccache-${{ matrix.device.profile }}-
          ${{ runner.os }}-openwrt-ccache-

    - name: Build OpenWrt Image (${{ matrix.device.name }})
      env:
        CI: "1"
        MAKE_ARGS: ${{ github.event.inputs.make_args }}
      run: |
        FLAGS="--profile ${{ matrix.device.profile }}"
        
        # Only build IB/SDK for primary (representative) devices to avoid redundancy
        if [ "${{ matrix.device.primary }}" == "true" ]; then
          if [ "${{ github.event_name == 'workflow_dispatch' }}" == "true" ]; then
            if [ "${{ github.event.inputs.build_ib }}" == "true" ]; then FLAGS="$FLAGS --imagebuilder"; fi
            if [ "${{ github.event.inputs.build_sdk }}" == "true" ]; then FLAGS="$FLAGS --sdk"; fi
          else
            # Default for automated runs (IB enabled by default)
            FLAGS="$FLAGS --imagebuilder"
          fi
        fi
        
        if [ -n "$MAKE_ARGS" ]; then
          FLAGS="$FLAGS --make-args \"$MAKE_ARGS\""
        fi

        eval nix develop --impure --command build-nss-image $FLAGS

    - name: Collect logs on failure
      if: failure()
      run: |
        mkdir -p /tmp/build-logs
        find . -maxdepth 8 -name "*.log" \
          ! -path "*/build_dir/host/*" \
          ! -path "*/build_dir/toolchain/*" \
          -exec cp --parents {} /tmp/build-logs/ \; 2>/dev/null || true

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: build-logs-${{ matrix.device.profile }}
        path: /tmp/build-logs/
        if-no-files-found: warn

    - name: Setup SSH Session
      if: failure()
      uses: owenthereal/action-upterm@v1
      with: 
        wait-timeout-minutes: 5

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: openwrt-${{ matrix.device.profile }}
        path: source/bin/
        if-no-files-found: warn

    - name: Upload to Release
      uses: softprops/action-gh-release@v2.4.2
      if: success()
      with:
        files: |
          source/bin/targets/**/*.bin
          source/bin/targets/**/*.itb
          source/bin/targets/**/*.tar.xz
          source/bin/targets/**/*.tar.zst
        tag_name: ${{ needs.prepare_release.outputs.release_tag }}
        name: OpenWrt NSS Build (${{ needs.prepare_release.outputs.release_tag }})
        draft: true
        append_body: true
        body: |
          * ${{ matrix.device.name }}
  finalize_release:
    needs: [prepare_release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark Release as Latest
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          draft: false
          prerelease: false
          make_latest: true

  post_build:
    needs: [check_upstream, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.ref }}

    - name: Download updated flake.lock
      uses: actions/download-artifact@v8
      with:
        name: flake-lock

    - name: Commit updated flake.lock
      run: |
        if [[ -n "$(git status --porcelain flake.lock)" ]]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake.lock [skip ci]"
          if ! git pull --rebase origin ${{ github.ref_name }}; then
            git rebase --abort || true
            echo "::warning::Rebase failed due to conflicts; skipping flake.lock push. Re-trigger the workflow to retry."
          else
            git push || echo "::warning::Push failed (possibly due to concurrent commits); skipping flake.lock push. Re-trigger the workflow to retry."
          fi
        else
          echo "flake.lock is already up to date."
        fi

    - name: Update Last Built Hash
      if: needs.check_upstream.outputs.latest_hash != ''
      env:
        GH_TOKEN: ${{ secrets.WRITE_TO_VAR }}
      run: |
        echo "Updating LAST_BUILT_HASH to ${{ needs.check_upstream.outputs.latest_hash }}"
        gh variable set LAST_BUILT_HASH \
          --body "${{ needs.check_upstream.outputs.latest_hash }}" \
          --repo ${{ github.repository }}